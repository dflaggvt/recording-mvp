name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "cloud.run.url=${{ secrets.CLOUD_RUN_URL }}" > local.properties

      - name: Build Debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"[^"]*"' | tr -d '"')
          CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '[0-9]+')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "code=${CODE}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${CODE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MemoryStream ${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.code }})"
          body: |
            **Auto-built from commit ${{ steps.version.outputs.short_sha }}**

            Download the APK below and install over your existing app.
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
